name: spec
on:
  push:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 6" # Every Saturday 6 AM

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      - name: Install shards
        run: shards install
      - name: Check formatting
        run: crystal tool format --check
      - name: Check linting
        run: ./bin/ameba

  sqlite-spec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crystal: [1.14.0, 1.15.1, 1.16.3, latest]
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Install shards
        run: shards update --ignore-crystal-version --skip-postinstall --skip-executables
      - name: Run tests
        timeout-minutes: 5
        run: crystal spec
        env:
          CURRENT_ADAPTER: sqlite
          SQLITE_DATABASE_URL: sqlite3:./grant.db
          SQLITE_REPLICA_URL: sqlite3:./grant_replica.db

  mysql-spec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crystal: [1.14.0, 1.15.1, 1.16.3, latest]
    services:
      mysql-primary:
        image: mysql:8.0
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: grant_db
          MYSQL_USER: grant
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
      mysql-replica:
        image: mysql:8.0
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: grant_replica_db
          MYSQL_USER: grant
          MYSQL_PASSWORD: password
        ports:
          - 3307:3306
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Install shards
        run: shards update --ignore-crystal-version --skip-postinstall --skip-executables
      - name: Run tests
        timeout-minutes: 5
        run: crystal spec
        env:
          CURRENT_ADAPTER: mysql
          MYSQL_DATABASE_URL: mysql://grant:password@localhost:3306/grant_db
          MYSQL_REPLICA_URL: mysql://grant:password@localhost:3307/grant_replica_db

  # Dedicated job exercising the DEFAULT caching_sha2_password auth plugin on
  # both MySQL 8.x and MySQL 9.x (Thread 3b). No mysql_native_password override
  # anywhere — this validates Grant's caching_sha2_password handshake against a
  # default-configured server. Mirrors docker-compose.test.yml (mysql8/mysql9).
  mysql-caching-sha2-spec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crystal: [1.16.3, latest]
        mysql: ["8.0", "9.0"]
    services:
      mysql:
        image: mysql:${{ matrix.mysql }}
        # NOTE: no --default-authentication-plugin override. MySQL 8.0+ and
        # 9.x default to caching_sha2_password.
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -ppassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: grant_db
          MYSQL_USER: grant
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Install shards
        run: shards update --ignore-crystal-version --skip-postinstall --skip-executables
      - name: Ensure grant user uses caching_sha2_password
        # The entrypoint already creates MYSQL_USER with the server default
        # plugin, but we pin it explicitly so the test intent is unambiguous,
        # and we confirm the plugin assignment in the job log.
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -ppassword <<'SQL'
          ALTER USER 'grant'@'%' IDENTIFIED WITH caching_sha2_password BY 'password';
          GRANT ALL PRIVILEGES ON grant_db.* TO 'grant'@'%';
          FLUSH PRIVILEGES;
          SELECT user, host, plugin FROM mysql.user WHERE user = 'grant';
          SELECT VERSION();
          SQL
      - name: Verify caching_sha2_password auth for grant user
        run: |
          mysqladmin ping -h 127.0.0.1 -P 3306 -u grant -ppassword | grep "mysqld is alive"
      - name: Run tests
        timeout-minutes: 5
        run: crystal spec
        env:
          CURRENT_ADAPTER: mysql
          MYSQL_DATABASE_URL: mysql://grant:password@127.0.0.1:3306/grant_db
          MYSQL_REPLICA_URL: mysql://grant:password@127.0.0.1:3306/grant_db

  psql-spec:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crystal: [1.14.0, 1.15.1, 1.16.3, latest]
    services:
      postgres-primary:
        image: postgres:16
        env:
          POSTGRES_USER: grant
          POSTGRES_PASSWORD: password
          POSTGRES_DB: grant_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      postgres-replica:
        image: postgres:16
        env:
          POSTGRES_USER: grant
          POSTGRES_PASSWORD: password
          POSTGRES_DB: grant_replica_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Install shards
        run: shards update --ignore-crystal-version --skip-postinstall --skip-executables
      - name: Run tests
        timeout-minutes: 5
        run: crystal spec
        env:
          CURRENT_ADAPTER: pg
          PG_DATABASE_URL: postgres://grant:password@localhost:5432/grant_db
          PG_REPLICA_URL: postgres://grant:password@localhost:5433/grant_replica_db

  sharding-spec:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crystal: [1.16.3, latest]
    services:
      # Shard 0 - Primary
      postgres-shard0-primary:
        image: postgres:16
        env:
          POSTGRES_USER: grant
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shard_0
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5440:5432
      # Shard 0 - Replica
      postgres-shard0-replica:
        image: postgres:16
        env:
          POSTGRES_USER: grant
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shard_0
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5441:5432
      # Shard 1 - Primary
      postgres-shard1-primary:
        image: postgres:16
        env:
          POSTGRES_USER: grant
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shard_1
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5442:5432
      # Shard 1 - Replica
      postgres-shard1-replica:
        image: postgres:16
        env:
          POSTGRES_USER: grant
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shard_1
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5443:5432
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Install shards
        run: shards update --ignore-crystal-version --skip-postinstall --skip-executables
      - name: Run sharding tests
        timeout-minutes: 10
        run: |
          # Run composite key tests first
          crystal spec spec/grant/composite_primary_key_spec.cr
          # TODO: Add more sharding tests as they are developed
        env:
          CURRENT_ADAPTER: pg
          # Primary connection
          PG_DATABASE_URL: postgres://grant:password@localhost:5432/grant_db
          PG_REPLICA_URL: postgres://grant:password@localhost:5433/grant_replica_db
          # Shard connections
          SHARD_0_PRIMARY: postgres://grant:password@localhost:5440/shard_0
          SHARD_0_REPLICA: postgres://grant:password@localhost:5441/shard_0
          SHARD_1_PRIMARY: postgres://grant:password@localhost:5442/shard_1
          SHARD_1_REPLICA: postgres://grant:password@localhost:5443/shard_1